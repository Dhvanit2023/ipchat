<h2>Join Room</h2>

<input id="room" placeholder="Room Code">
<input id="answer" placeholder="Answer">

<button onclick="join()">Join Room</button>

<hr>

<h2>Create Room</h2>

<input id="croom" placeholder="Room Code">
<input id="rname" placeholder="Room Name">
<input id="max" placeholder="Max Users">

<input id="question" placeholder="Security Question">
<input id="ans" placeholder="Answer">

<button onclick="create()">Create Room</button>

<script>

async function create(){

let room=croom.value
let name=rname.value
let max=document.getElementById("max").value
let question=document.getElementById("question").value
let answer=document.getElementById("ans").value

await fetch("/create-room",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({room,name,max,question,answer})
})

alert("room created")

}

function join(){

localStorage.room=room.value
localStorage.answer=answer.value

location="chat.html"

}
if(!localStorage.user){

window.location.href="login.html"

}

</script>
